<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陈家大饭店-杨厨师专用</title>
    <style>
        :root { --primary: #ff9500; --bg: #f2f2f7; --card: #ffffff; }
        body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); margin: 0; padding: 10px 10px 160px; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        
        .add-panel { background: var(--card); padding: 15px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-row input { flex: 1; border: 1px solid #e5e5ea; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; background: #f9f9f9; }
        textarea { width: 100%; border: 1px solid #e5e5ea; border-radius: 10px; padding: 12px; font-size: 14px; min-height: 80px; box-sizing: border-box; background: #f9f9f9; margin-bottom: 10px; line-height: 1.5; resize: none; }
        
        .switch-group { display: flex; gap: 15px; margin: 0 5px 15px; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 12px; align-items: center; }
        .switch-item { display: flex; align-items: center; font-size: 13px; font-weight: bold; color: #666; cursor: pointer; }
        .switch-item input { margin-right: 6px; width: 18px; height: 18px; accent-color: var(--primary); }

        .btn-group { display: flex; gap: 8px; }
        .add-btn { flex: 2; background: #007aff; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .import-btn { flex: 1; background: #34c759; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 13px; position: relative; overflow: hidden; text-align: center; display: flex; align-items: center; justify-content: center; }
        #fileInput { position: absolute; left: 0; top: 0; opacity: 0; height: 100%; width: 100%; cursor: pointer; }

        .nav { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .nav::-webkit-scrollbar { display: none; }
        .nav-btn { background: white; border: 1px solid #e5e5ea; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-size: 13px; font-weight: 600; color: #666; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: white; border-radius: 16px; padding: 25px 10px; text-align: center; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; border: 2px solid transparent; transition: 0.2s; }
        .item.selected { border-color: var(--primary); background: #fff9f2; color: var(--primary); }
        .check-tag { position: absolute; top: 8px; right: 10px; font-size: 14px; opacity: 0.2; }
        .item.selected .check-tag { opacity: 1; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #e5e5ea; z-index: 100; }
        .btn-main { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; background: var(--primary); color: white; font-size: 16px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,149,0,0.2); }

        #recipeDrawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; padding: 30px 25px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 400; max-height: 70vh; overflow-y: auto; }
        #recipeDrawer.active { transform: translateY(0); box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 500; overflow-y: auto; padding: 20px 10px; }
        .modal.show { display: block; }
        #resultImg { width: 100%; max-width: 500px; display: block; margin: 0 auto; background: white; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="add-panel">
        <div class="input-row">
            <input type="text" id="fName" placeholder="菜名">
            <input type="text" id="fCat" placeholder="分类">
        </div>
        <textarea id="fRecipe" placeholder="制作方法（直接换行或写 \n 均可识别）..."></textarea>
        <div class="btn-group">
            <button class="add-btn" onclick="addOne()">手动录入</button>
            <div class="import-btn">批量导入TXT<input type="file" id="fileInput" accept=".txt" onchange="importTxt(this)"></div>
        </div>
    </div>

    <div class="switch-group">
        <label class="switch-item"><input type="checkbox" id="showRecipeSwitch" checked onchange="saveSettings()"> 开启预览</label>
        <label class="switch-item"><input type="checkbox" id="includeStepSwitch" onchange="saveSettings()"> 单据包含步骤</label>
        <span onclick="clearAll()" style="margin-left:auto; color:#999; font-size:12px;">清空库</span>
    </div>

    <div class="nav" id="navBar"></div>
    <div class="grid" id="foodGrid"></div>

    <div class="footer">
        <button class="btn-main" onclick="makePic()">📸 生成选餐清单（支持长按保存）</button>
    </div>

    <div id="recipeDrawer" onclick="this.classList.remove('active')">
        <div id="drawerBody" onclick="event.stopPropagation()"></div>
        <button class="add-btn" style="background:#f2f2f7; color:#333; margin-top:20px; width:100%;" onclick="document.getElementById('recipeDrawer').classList.remove('active')">收起</button>
    </div>

    <div class="modal" id="billModal" onclick="this.classList.remove('show')">
        <img id="resultImg" src="">
        <p style="color:white; text-align:center; margin-top:15px; font-weight:bold;">↑ 已生成高清图片，长按保存并分享 ↑</p>
    </div>

    <script>
        const utils = {
            toKey: (s) => s.trim().toLowerCase().replace(/[\s\t]/g, ''),
            format: (t) => t ? t.replace(/\\n/g, '\n').replace(/\n+/g, '\n').trim() : ""
        };

        let db = JSON.parse(localStorage.getItem('final_chef_db_v2')) || [];
        let selected = [];
        let curCat = '全部';

        const settings = JSON.parse(localStorage.getItem('app_settings')) || { showRecipe: true, includeStep: false };
        document.getElementById('showRecipeSwitch').checked = settings.showRecipe;
        document.getElementById('includeStepSwitch').checked = settings.includeStep;

        function saveSettings() {
            localStorage.setItem('app_settings', JSON.stringify({
                showRecipe: document.getElementById('showRecipeSwitch').checked,
                includeStep: document.getElementById('includeStepSwitch').checked
            }));
        }

        function render() {
            const cats = ['全部', ...new Set(db.map(i => i.c))];
            document.getElementById('navBar').innerHTML = cats.map(c => `<button class="nav-btn ${curCat===c?'active':''}" onclick="curCat='${c}';render()">${c}</button>`).join('');
            const list = curCat === '全部' ? db : db.filter(i => i.c === curCat);
            document.getElementById('foodGrid').innerHTML = list.map(item => `
                <div class="item ${selected.includes(item.n)?'selected':''}" onclick="handleItemClick('${item.n}')">
                    <span class="check-tag">${selected.includes(item.n)?'✅':'➕'}</span>
                    <div style="font-size:9px; color:#999; margin-bottom:5px; font-weight:normal;">${item.c}</div>
                    ${item.n}
                </div>
            `).join('');
            localStorage.setItem('final_chef_db_v2', JSON.stringify(db));
        }

        function handleItemClick(name) {
            const isSelected = selected.includes(name);
            const drawer = document.getElementById('recipeDrawer');
            if (isSelected) {
                selected = selected.filter(n => n !== name);
                drawer.classList.remove('active'); // 取消选中时联动关闭预览
            } else {
                selected.push(name);
                if (document.getElementById('showRecipeSwitch').checked) {
                    const item = db.find(x => x.n === name);
                    const detail = utils.format(item.r).replace(/\n/g, '<br/>');
                    document.getElementById('drawerBody').innerHTML = `<h2 style="color:var(--primary);margin-top:0;">${item.n}</h2><div style="line-height:1.7; color:#444; font-size:15px;">${detail || '暂无详细步骤'}</div>`;
                    drawer.classList.add('active');
                }
            }
            render();
        }

        function addOne() {
            const n = document.getElementById('fName').value.trim();
            const c = document.getElementById('fCat').value.trim() || '默认';
            const r = document.getElementById('fRecipe').value;
            if(!n) return;
            if(db.some(x => utils.toKey(x.n) === utils.toKey(n))) return alert("菜名已存在");
            db.unshift({n, c, r: utils.format(r)});
            selected.push(n); render();
            document.getElementById('fName').value = ""; document.getElementById('fRecipe').value = "";
        }

        function importTxt(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                e.target.result.split('\n').forEach(line => {
                    const [n, c, r] = line.split('#');
                    if(n && !db.some(x => utils.toKey(x.n) === utils.toKey(n.trim()))) {
                        db.unshift({n: n.trim(), c: c?c.trim():'默认', r: utils.format(r)});
                    }
                });
                render();
            };
            reader.readAsText(input.files[0]);
        }

        function clearAll() { if(confirm("确定清空库？")) { db=[]; selected=[]; render(); } }

        function makePic() {
            if(!selected.length) return;
            const items = selected.map(n => db.find(x => x.n === n));
            const hasDetail = document.getElementById('includeStepSwitch').checked;
            
            // 核心修复：更准确的高度计算，增加底部安全边距
            let h = 240; // 初始页眉高度
            const listHtml = items.map(it => {
                const r = utils.format(it.r);
                const stepHtml = (hasDetail && r) ? `<div style="font-size:14px; color:#666; margin-top:8px; line-height:1.5; background:#f9f9f9; padding:10px; border-radius:8px;">${r.replace(/\n/g, '<br/>')}</div>` : '';
                
                // 每道菜基础高度 65px + 步骤文字预估高度
                h += 65; 
                if(hasDetail && r) {
                    const lineCount = r.split('\n').length;
                    h += (lineCount * 22) + 20; 
                }
                
                return `<div style="margin-bottom:20px; border-bottom:1px solid #f2f2f2; padding-bottom:15px;">
                    <div style="font-size:20px; font-weight:bold; color:#333;">● ${it.n} <span style="font-size:12px; color:#999; font-weight:normal;">[${it.c}]</span></div>
                    ${stepHtml}
                </div>`;
            }).join('');

            h += 80; // 额外增加底部寄语的空间，防止遮挡

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="500" height="${h}">
                <foreignObject width="100%" height="100%">
                    <div xmlns="http://www.w3.org/1999/xhtml" style="padding:40px; background:white; font-family:sans-serif;">
                        <div style="text-align:center; border-bottom:4px solid #ff9500; padding-bottom:20px; margin-bottom:30px;">
                            <h1 style="margin:0; font-size:30px; letter-spacing:2px;">今日私厨清单</h1>
                            <p style="color:#999; margin:10px 0 0 0;">${new Date().toLocaleString()}</p>
                        </div>
                        ${listHtml}
                        <div style="text-align:center; color:#ccc; font-size:13px; margin-top:30px; padding-bottom:20px;">- 每一道菜都值得被用心对待 -</div>
                    </div>
                </foreignObject>
            </svg>`;

            const img = document.getElementById('resultImg');
            img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
            document.getElementById('billModal').classList.add('show');
        }

        render();
    </script>
</body>
</html>
