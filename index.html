<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私厨智能菜单</title>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* 搜索与分类 */
        .sticky-header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding-bottom: 10px; }
        .search-box { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 25px; outline: none; box-sizing: border-box; }
        .filter-wrapper { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .tag { padding: 6px 14px; background: #fff; border-radius: 20px; font-size: 13px; white-space: nowrap; border: 1px solid #ddd; }
        .tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 菜单卡片 */
        #menuContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; border-top: 4px solid var(--primary); }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; display: flex; justify-content: space-between; }
        .cat-badge { font-size: 11px; color: var(--primary); background: #fff3e0; padding: 2px 6px; border-radius: 4px; }
        .recipe-content { font-size: 14px; color: #666; line-height: 1.6; white-space: pre-wrap; margin-bottom: 45px; }
        
        /* 下单按钮 */
        .order-btn { position: absolute; bottom: 15px; right: 15px; padding: 6px 15px; border-radius: 15px; border: none; background: #eee; cursor: pointer; }
        .order-btn.selected { background: var(--primary); color: #fff; }

        /* 底部条 */
        .footer-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #333; color: #fff; border-radius: 30px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200; }
        .checkout-btn { background: var(--primary); border: none; color: #fff; padding: 8px 18px; border-radius: 20px; font-weight: bold; }

        /* 清单预览层 - 模拟图3样式 */
        #orderOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .list-header { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .list-item { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .list-item h2 { font-size: 20px; margin: 0 0 10px 0; }
        .close-overlay { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 30px; height: 30px; }
    </style>
</head>
<body>

<div id="mainUI">
    <div class="sticky-header">
        <input type="text" id="searchInput" class="search-box" placeholder="搜索菜名、食材...">
        <div class="filter-wrapper" id="filterTags"></div>
    </div>
    <div id="menuContainer">加载中...</div>
    <div class="footer-bar">
        <span>已选 <b id="cartCount">0</b> 道菜</span>
        <button class="checkout-btn" onclick="showOrder()">生成清单</button>
    </div>
</div>

<div id="orderOverlay">
    <button class="close-overlay" onclick="closeOrder()">✕</button>
    <div class="list-header">
        <h1>今日私厨清单</h1>
        <p id="orderDate"></p>
    </div>
    <div id="orderList"></div>
    <p style="text-align: center; color: #ccc; font-size: 12px; margin-top: 40px;">—— 每一道菜都值得被用心对待 ——</p>
</div>

<script>
    let menuData = [];
    let selectedSet = new Set();
    let currentCat = '全部';

    async function load() {
        try {
            const res = await fetch('menu.txt');
            const text = await res.text();
            const map = new Map();

            text.split('\n').forEach(line => {
                // 正则适配：菜名#分类#做法内容
                const m = line.match(/^([^#]+)#([^#]+)#(.*)$/);
                if (m) {
                    const name = m[1].trim();
                    map.set(name, { name, cat: m[2].trim(), detail: m[3].trim().replace(/\\n/g, '\n') });
                }
            });
            menuData = Array.from(map.values());
            renderTags();
            renderMenu();
        } catch(e) { console.error(e); }
    }

    function renderTags() {
        const cats = ['全部', ...new Set(menuData.map(i => i.cat))];
        document.getElementById('filterTags').innerHTML = cats.map(c => 
            `<div class="tag ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>`
        ).join('');
    }

    function setCat(c) { currentCat = c; renderTags(); renderMenu(); }

    function renderMenu() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = menuData.filter(i => (currentCat === '全部' || i.cat === currentCat) && 
            (i.name.toLowerCase().includes(kw) || i.detail.toLowerCase().includes(kw)));

        document.getElementById('menuContainer').innerHTML = filtered.map(i => `
            <div class="card">
                <h3>${i.name} <span class="cat-badge">${i.cat}</span></h3>
                <div class="recipe-content">${i.detail}</div>
                <button class="order-btn ${selectedSet.has(i.name) ? 'selected' : ''}" 
                        onclick="toggleSelect('${i.name}')">
                    ${selectedSet.has(i.name) ? '已选' : '选择'}
                </button>
            </div>
        `).join('');
    }

    function toggleSelect(name) {
        selectedSet.has(name) ? selectedSet.delete(name) : selectedSet.add(name);
        document.getElementById('cartCount').innerText = selectedSet.size;
        renderMenu();
    }

    function showOrder() {
        if (selectedSet.size === 0) return alert("请先选菜");
        const list = menuData.filter(i => selectedSet.has(i.name));
        document.getElementById('orderDate').innerText = new Date().toLocaleString();
        document.getElementById('orderList').innerHTML = list.map(i => `
            <div class="list-item">
                <h2>● ${i.name} <small style="font-size:12px; color:#999; font-weight:normal;">[${i.cat}]</small></h2>
                <div style="white-space:pre-wrap; font-size:14px; color:#444;">${i.detail}</div>
            </div>
        `).join('');
        document.getElementById('orderOverlay').style.display = 'block';
    }

    function closeOrder() { document.getElementById('orderOverlay').style.display = 'none'; }

    document.getElementById('searchInput').addEventListener('input', renderMenu);
    load();
</script>
</body>
</html>
