<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的智能菜单</title>
    <style>
        :root {
            --primary-color: #e67e22;
            --bg-color: #f8f9fa;
        }
        body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
        
        /* 搜索与导航栏 */
        .sticky-header { position: sticky; top: 0; background: var(--bg-color); z-index: 100; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .search-box { width: 100%; padding: 12px; border: 2px solid var(--primary-color); border-radius: 25px; box-sizing: border-box; font-size: 16px; outline: none; margin-bottom: 15px; }
        .filter-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tag { padding: 6px 15px; background: #fff; border: 1px solid #ddd; border-radius: 15px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .tag.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* 菜单列表布局 */
        #menuContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 5px solid var(--primary-color); }
        .card h3 { margin: 0 0 10px 0; color: #333; display: flex; justify-content: space-between; }
        .card .category { font-size: 12px; background: #eee; padding: 2px 8px; border-radius: 4px; color: #666; }
        .card p { font-size: 14px; color: #555; line-height: 1.5; margin: 5px 0; }
        .highlight { color: var(--primary-color); font-weight: bold; }
        
        @media (max-width: 600px) {
            #menuContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sticky-header">
    <input type="text" id="searchInput" class="search-box" placeholder="输入菜名、食材或菜系搜索...">
    <div class="filter-tags" id="filterTags">
        <span class="tag active" onclick="filterByCategory('全部')">全部</span>
        </div>
</div>

<div id="menuContainer">
    </div>

<script>
    let allRawData = []; // 存储去重后的对象数组
    let currentCategory = '全部';

    // 1. 初始化加载
    async function init() {
        try {
            const response = await fetch('menu.txt');
            const text = await response.text();
            
            // 解析并去重：以菜名为 Key，后面的覆盖前面的
            const menuMap = new Map();
            text.split('\n').forEach(line => {
                if (!line.includes('#')) return;
                const [nameSection, categorySection] = line.split('#');
                const [category, details] = categorySection.split('【');
                
                // 结构化存储，方便搜索
                menuMap.set(nameSection.trim(), {
                    name: nameSection.trim(),
                    category: category.trim(),
                    content: '【' + details,
                    raw: line
                });
            });

            allRawData = Array.from(menuMap.values());
            
            renderTags();
            renderMenu(allRawData);
        } catch (e) {
            document.getElementById('menuContainer').innerHTML = "<p>菜单文件加载失败，请检查 menu.txt 是否存在。</p>";
        }
    }

    // 2. 动态生成分类标签
    function renderTags() {
        const categories = ['全部', ...new Set(allRawData.map(item => item.category))];
        const tagContainer = document.getElementById('filterTags');
        tagContainer.innerHTML = categories.map(cat => 
            `<span class="tag ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</span>`
        ).join('');
    }

    // 3. 渲染菜单卡片
    function renderMenu(data) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = data.length ? "" : "<p style='text-align:center; grid-column: 1/-1;'>没有找到相关菜品</p>";
        
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            // 简单处理内容换行显示
            const formattedContent = item.content.replace(/\\n/g, '<br>');
            
            card.innerHTML = `
                <h3>${item.name} <span class="category">${item.category}</span></h3>
                <div style="white-space: pre-wrap; font-size: 13px; color: #666;">${formattedContent}</div>
            `;
            container.appendChild(card);
        });
    }

    // 4. 分类过滤逻辑
    function filterByCategory(cat) {
        currentCategory = cat;
        renderTags();
        executeSearch();
    }

    // 5. 搜索执行逻辑 (组合分类和关键字)
    function executeSearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allRawData.filter(item => {
            const matchCategory = (currentCategory === '全部' || item.category === currentCategory);
            const matchKeyword = item.name.toLowerCase().includes(keyword) || 
                                 item.content.toLowerCase().includes(keyword) ||
                                 item.category.toLowerCase().includes(keyword);
            return matchCategory && matchKeyword;
        });
        
        renderMenu(filtered);
    }

    // 6. 搜索框监听
    document.getElementById('searchInput').addEventListener('input', executeSearch);

    // 启动
    init();
</script>

</body>
</html>
