<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私厨智能菜单</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #e67e22; --bg: #f4f7f6; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 100px; }
        
        /* 头部与控制区 */
        .sticky-header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 5px 0; border-bottom: 1px solid #eee; }
        .search-box { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 25px; outline: none; box-sizing: border-box; }
        .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        /* 优化后的标签和勾选框布局 */
        .switch-row { display: flex; justify-content: space-between; align-items: center; }
        .filter-wrapper { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; flex: 1; margin-right: 10px; }
        .filter-wrapper::-webkit-scrollbar { display: none; }
        .tag { padding: 5px 12px; background: #fff; border-radius: 15px; font-size: 12px; white-space: nowrap; border: 1px solid #ddd; cursor: pointer; }
        .tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .options-row { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 8px 12px; border-radius: 12px; border: 1px solid #eee; }
        .check-label { font-size: 12px; color: #666; display: flex; align-items: center; gap: 4px; white-space: nowrap; cursor: pointer; }
        .check-label input { cursor: pointer; }

        /* 菜单卡片 */
        #menuContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .card { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-top: 3px solid var(--primary); position: relative; transition: 0.2s; }
        .card h3 { margin: 0; font-size: 15px; line-height: 1.4; }
        .cat-badge { font-size: 10px; color: var(--primary); background: #fff3e0; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 4px; }
        
        /* 做法显示控制 */
        .recipe-content { font-size: 13px; color: #666; line-height: 1.5; white-space: pre-wrap; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #eee; display: none; margin-bottom: 35px; }
        body.view-recipe-on .recipe-content { display: block; }
        body.view-recipe-on #menuContainer { grid-template-columns: 1fr; }

        .order-btn { position: absolute; bottom: 8px; right: 8px; padding: 4px 12px; border-radius: 12px; border: none; background: #f0f0f0; font-size: 11px; cursor: pointer; }
        .order-btn.selected { background: var(--primary); color: #fff; }

        /* 底部工具栏 */
        .footer-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #333; color: #fff; border-radius: 30px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cart-info { cursor: pointer; font-size: 14px; }
        .cart-info:active { opacity: 0.8; }
        .checkout-btn { background: var(--primary); border: none; color: #fff; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 14px; }

        /* 弹窗样式 (已选列表) */
        #cartModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; max-height: 80vh; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s; }
        .modal-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .modal-body { overflow-y: auto; padding: 0; }
        .cart-item { padding: 12px 15px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-name { font-size: 14px; flex: 1; }
        .delete-btn { color: var(--danger); background: #fff0f0; border: 1px solid #ffcccc; padding: 2px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        
        /* 截图预览 */
        #orderCaptureArea { position: absolute; left: -9999px; width: 375px; background: #fff; padding: 30px 20px; }
        .list-title { text-align: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; font-size: 22px; color: #333; }
        .list-item { margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }

        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #resultImage { max-width: 85%; max-height: 75%; border: 3px solid #fff; border-radius: 5px; }
        .modal-tip { color: #fff; margin-top: 15px; background: var(--primary); padding: 8px 20px; border-radius: 20px; font-size: 14px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.05);} }
        @keyframes slideUp { from {transform: translateY(20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
    </style>
</head>
<body>

<div class="sticky-header">
    <input type="text" id="searchInput" class="search-box" placeholder="搜索菜名、食材、菜系...">
    <div class="controls">
        <!-- 第一行：标签筛选 + 浏览模式开关 -->
        <div class="switch-row">
            <div class="filter-wrapper" id="filterTags"></div>
            <label class="check-label">
                <input type="checkbox" id="viewToggle" onchange="updateViewMode()"> 浏览显做法
            </label>
        </div>
        <!-- 第二行：生成选项 (优化位置) -->
        <div class="options-row">
            <label class="check-label" style="color: var(--primary); font-weight: bold;">
                <input type="checkbox" id="printToggle" checked> 生成清单含做法
            </label>
            <span style="font-size:11px; color:#999;">设置生成图片的格式</span>
        </div>
    </div>
</div>

<div id="menuContainer">加载中...</div>

<!-- 底部工具栏 -->
<div class="footer-bar">
    <!-- 点击此处弹出已选列表 -->
    <div class="cart-info" onclick="showCartModal()">
        已选 <b id="cartCount" style="color: var(--primary); font-size: 16px;">0</b> 道 <span style="font-size:10px; opacity:0.7;">(点击查看/删除)</span>
    </div>
    <button class="checkout-btn" onclick="generateImage()">生成保存图</button>
</div>

<!-- 已选菜品弹窗 -->
<div id="cartModal" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-content">
        <div class="modal-header">
            <span>已选菜品清单</span>
            <button class="close-btn" onclick="document.getElementById('cartModal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body" id="cartListBody">
            <!-- 列表由 JS 生成 -->
        </div>
    </div>
</div>

<!-- 截图隐藏区域 -->
<div id="orderCaptureArea">
    <div class="list-title">今日私厨清单</div>
    <div id="captureList"></div>
    <p style="text-align: center; color: #bbb; font-size: 11px; margin-top: 30px;">—— 每一道菜都值得被用心对待 ——</p>
</div>

<!-- 结果预览弹窗 -->
<div id="resultModal" onclick="this.style.display='none'">
    <img id="resultImage" src="" alt="清单图">
    <div class="modal-tip">长按图片 ➔ 保存或发送</div>
    <p style="color: #888; font-size: 12px; margin-top: 12px;">点击任意位置返回菜单</p>
</div>

<script>
    let menuData = [];
    let selectedSet = new Set();
    let currentCat = '全部';

    async function init() {
        try {
            const res = await fetch('menu.txt');
            if (!res.ok) throw new Error("File not found");
            const text = await res.text();
            const map = new Map();
            text.split('\n').forEach(line => {
                const m = line.match(/^([^#]+)#([^#]+)#(.*)$/);
                if (m) {
                    const name = m[1].trim();
                    map.set(name, { name, cat: m[2].trim(), detail: m[3].trim().replace(/\\n/g, '\n') });
                }
            });
            menuData = Array.from(map.values());
            renderTags();
            renderMenu();
        } catch(e) { 
            document.getElementById('menuContainer').innerHTML = '<div style="padding:20px; text-align:center; color:#e74c3c;">加载 menu.txt 失败<br><small>请确保文件在同一目录下，并使用本地服务器运行</small></div>';
            console.error(e);
        }
    }

    function updateViewMode() {
        document.body.classList.toggle('view-recipe-on', document.getElementById('viewToggle').checked);
    }

    function renderTags() {
        const cats = ['全部', ...new Set(menuData.map(i => i.cat))];
        document.getElementById('filterTags').innerHTML = cats.map(c => 
            `<div class="tag ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>`
        ).join('');
    }

    function setCat(c) { currentCat = c; renderTags(); renderMenu(); }

    function renderMenu() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = menuData.filter(i => (currentCat === '全部' || i.cat === currentCat) && 
            (i.name.toLowerCase().includes(kw) || i.detail.toLowerCase().includes(kw)));

        document.getElementById('menuContainer').innerHTML = filtered.map(i => {
            const isSelected = selectedSet.has(i.name);
            return `
            <div class="card">
                <h3>${i.name} <br><span class="cat-badge">${i.cat}</span></h3>
                <div class="recipe-content">${i.detail}</div>
                <button class="order-btn ${isSelected ? 'selected' : ''}" onclick="toggleSelect('${i.name}')">
                    ${isSelected ? '√ 已选 (点击取消)' : '选择'}
                </button>
            </div>
        `}).join('');
    }

    function toggleSelect(name) {
        if (selectedSet.has(name)) {
            selectedSet.delete(name);
        } else {
            selectedSet.add(name);
        }
        updateCartCount();
        renderMenu();
    }

    function updateCartCount() {
        document.getElementById('cartCount').innerText = selectedSet.size;
    }

    // 显示已选列表弹窗
    function showCartModal() {
        const modal = document.getElementById('cartModal');
        const body = document.getElementById('cartListBody');
        
        if (selectedSet.size === 0) {
            body.innerHTML = '<div style="padding:20px; text-align:center; color:#999;">暂无已选菜品</div>';
        } else {
            body.innerHTML = Array.from(selectedSet).map(name => {
                const item = menuData.find(i => i.name === name);
                const cat = item ? item.cat : '';
                return `
                <div class="cart-item">
                    <div class="cart-item-name">${name} <span style="font-size:10px; color:#999; background:#f0f0f0; padding:1px 4px; border-radius:3px; margin-left:5px;">${cat}</span></div>
                    <button class="delete-btn" onclick="removeItem('${name}')">删除</button>
                </div>
                `;
            }).join('');
        }
        modal.style.display = 'flex';
    }

    // 从列表中删除
    function removeItem(name) {
        selectedSet.delete(name);
        updateCartCount();
        renderMenu();
        showCartModal(); // 刷新列表
    }

    async function generateImage() {
        if (selectedSet.size === 0) return alert("请先选菜");
        const showInPrint = document.getElementById('printToggle').checked;
        const list = menuData.filter(i => selectedSet.has(i.name));
        
        document.getElementById('captureList').innerHTML = list.map(i => `
            <div class="list-item">
                <h2 style="margin:0 0 8px 0; font-size:18px;">● ${i.name} <span style="font-size:11px; color:#e67e22;">[${i.cat}]</span></h2>
                ${showInPrint ? `<div style="white-space:pre-wrap; font-size:14px; color:#444; line-height:1.6;">${i.detail}</div>` : ''}
            </div>
        `).join('');

        const area = document.getElementById('orderCaptureArea');
        const canvas = await html2canvas(area, { scale: 2, useCORS: true });
        const imgElement = document.getElementById('resultImage');
        imgElement.src = canvas.toDataURL("image/png");
        document.getElementById('resultModal').style.display = 'flex';
    }

    document.getElementById('searchInput').addEventListener('input', renderMenu);
    init();
</script>
</body>
</html>
